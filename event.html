<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Event — Virtuosic 2K26</title>
    <meta name="description" content="Event details — Virtuosic 2K26.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { dark: { 900: '#000000', 800: '#0A0A0A', 700: '#111111' } } } } }</script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-black text-white min-h-screen overflow-x-hidden">
    <div class="star-field" id="starField"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="mobile-frame relative z-10 page-enter min-h-screen pb-28">

        <!-- ═══ TOP BAR ═══ -->
        <header class="flex items-center justify-between px-5 py-4">
            <a href="competition.html"
                class="flex items-center gap-2 text-zinc-500 hover:text-purple-400 transition-colors">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                <span class="font-space text-xs font-bold uppercase tracking-widest">Back to Events</span>
            </a>
        </header>

        <!-- ═══ EVENT CONTENT (JS-rendered) ═══ -->
        <div class="px-6 pt-1" id="event-content">

            <!-- Title -->
            <h1 class="font-anton text-[2.5rem] leading-[0.95] text-white uppercase tracking-wide mb-4" id="event-title"
                style="text-shadow: 0 0 40px rgba(124,58,237,0.2);">Event</h1>
            <p class="text-[15px] text-zinc-400 leading-relaxed mb-6" id="event-desc"></p>

            <!-- Info Blocks -->
            <div class="flex gap-3 overflow-x-auto pb-3 mb-8" id="info-blocks"
                style="scrollbar-width:none;-webkit-overflow-scrolling:touch;"></div>

            <!-- Innovation Banner (Quantexera-style) -->
            <div class="mb-8 py-6 text-center">
                <div class="font-anton text-3xl text-white uppercase tracking-wider" id="event-banner"
                    style="text-shadow: 0 0 40px rgba(124,58,237,0.3), 0 0 80px rgba(6,182,212,0.15);">
                    INNOVATION<br><span
                        class="text-glow italic font-outfit font-thin text-2xl tracking-tight">unleashed.</span>
                </div>
                <p class="text-xs text-zinc-600 mt-3 max-w-[280px] mx-auto leading-relaxed" id="event-banner-desc"></p>
            </div>

            <!-- About -->
            <section class="mb-8">
                <h2
                    class="font-outfit text-xl font-extrabold text-white flex items-center gap-3 mb-4 section-accent uppercase tracking-wide">
                    About the Event</h2>
                <p class="text-[15px] text-zinc-400 leading-[1.9]" id="event-about"></p>
            </section>

            <!-- Rules (Quantexera numbered grid style) -->
            <section class="mb-8">
                <h2
                    class="font-outfit text-xl font-extrabold text-white flex items-center gap-3 mb-5 section-accent uppercase tracking-wide">
                    Competition Rules</h2>
                <div class="grid grid-cols-1 gap-3" id="event-rules"></div>
            </section>

            <!-- Judging (Progress bar style) -->
            <section class="mb-8">
                <h2
                    class="font-outfit text-xl font-extrabold text-white flex items-center gap-3 mb-5 section-accent uppercase tracking-wide">
                    Judging Criteria</h2>
                <div class="space-y-5" id="event-judging"></div>
            </section>

            <!-- Coordinators -->
            <section class="mb-6">
                <h2
                    class="font-outfit text-xl font-extrabold text-white flex items-center gap-3 mb-5 section-accent uppercase tracking-wide">
                    Support</h2>
                <div class="space-y-4" id="event-coordinators"></div>
            </section>
        </div>

        <!-- ═══ FLOATING REGISTER ═══ -->
        <button id="floating-register"
            class="fixed bottom-[88px] left-1/2 -translate-x-1/2 z-40 px-10 py-4 bg-white rounded-full font-outfit text-sm font-black text-black uppercase tracking-[3px] overflow-hidden"
            style="box-shadow: 0 0 20px rgba(255,255,255,0.25), 0 0 50px rgba(255,255,255,0.1);">
            Register Now
        </button>

        <!-- ═══ BOTTOM NAV ═══ -->
        <nav class="nav-bar-fixed fixed bottom-0 left-0 right-0 h-[72px] bg-black/90 backdrop-blur-2xl border-t border-white/[0.04] flex items-center justify-around px-2 z-50"
            style="padding-bottom: env(safe-area-inset-bottom, 0px);">
            <a href="index.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <svg class="w-[22px] h-[22px] text-zinc-600" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                <span class="font-space text-[9px] font-bold uppercase tracking-widest text-zinc-600">Home</span>
            </a>
            <a href="competition.html" class="relative flex flex-col items-center gap-1 px-4 py-2 nav-active">
                <svg class="w-[22px] h-[22px] text-purple-400"
                    style="filter: drop-shadow(0 0 8px rgba(168,85,247,0.5));" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                </svg>
                <span class="font-space text-[9px] font-bold uppercase tracking-widest text-purple-400">Events</span>
            </a>
            <a href="contact.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <svg class="w-[22px] h-[22px] text-zinc-600" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
                </svg>
                <span class="font-space text-[9px] font-bold uppercase tracking-widest text-zinc-600">Contact</span>
            </a>
            <a href="social.html" class="flex flex-col items-center gap-1 px-4 py-2">
                <svg class="w-[22px] h-[22px] text-zinc-600" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3" />
                    <circle cx="6" cy="12" r="3" />
                    <circle cx="18" cy="19" r="3" />
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                </svg>
                <span class="font-space text-[9px] font-bold uppercase tracking-widest text-zinc-600">Social</span>
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>

</html>
