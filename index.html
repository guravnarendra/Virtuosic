<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VIRTUOSIC</title>
  <meta name="description"
    content="Virtuosic 2K26 — The ultimate techfest at SSPM's College of Engineering, Kankavli. April 8-9, 2026.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { dark: { 900: '#000000', 800: '#0A0A0A', 700: '#111111', 600: '#1A1A1A' } } } } }</script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-black text-white min-h-screen overflow-x-hidden">

  <!-- Star Field (generated by JS) -->
  <div class="star-field" id="starField"></div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="mobile-frame relative z-10 page-enter h-[100dvh] overflow-hidden flex flex-col">

    <!-- ═══ TOP BAR ═══ -->
    <header class="flex items-center justify-between px-5 pt-2 pb-3">
      <a href="index.html" class="shrink-0 block"><img src="profilephoto/logo.png" alt="Virtuosic" class="w-24 h-24 rounded-2xl object-cover shimmer"></a>
      <div class="text-right">
        <p
          class="font-outfit text-[13px] font-extrabold text-white tracking-wide leading-tight uppercase whitespace-nowrap">
          SSPM's College of Engineering</p>
        <p class="text-[11px] text-zinc-500 font-medium tracking-widest mt-0.5 uppercase">Kankavli · Sindhudurg</p>
      </div>
    </header>

    <!-- ═══ HERO ═══ -->
    <main class="flex-1 flex flex-col items-center text-center px-6 gap-0 mt-4">

      <!-- Title Block -->
      <div class="relative mb-1 inline-block">
        <h1 class="font-anton text-[4.5rem] leading-[0.85] uppercase tracking-wide flex">
          <span class="fire-letter" style="--i:0">V</span>
          <span class="fire-letter" style="--i:1">I</span>
          <span class="fire-letter" style="--i:2">R</span>
          <span class="fire-letter" style="--i:3">T</span>
          <span class="fire-letter" style="--i:4">U</span>
          <span class="fire-letter" style="--i:5">O</span>
          <span class="fire-letter" style="--i:6">S</span>
          <span class="fire-letter" style="--i:7">I</span>
          <span class="fire-letter" style="--i:8">C</span>
        </h1>
      </div>
      <div class="relative mb-3">
        <span class="font-outfit text-3xl font-extrabold tracking-[12px] uppercase"
          style="background: linear-gradient(135deg, #FBBF24, #F59E0B, #D97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-shadow: none; filter: drop-shadow(0 0 15px rgba(251,191,36,0.3));">2K26</span>
      </div>

      <p class="font-space text-xs text-zinc-500 tracking-[6px] uppercase mb-6 font-semibold">Where Skills Define You
      </p>

      <!-- Date Badge (below title) -->
      <div class="text-center select-none w-full max-w-full overflow-hidden"
        style="font-size: clamp(1rem, 8vw, 2.2rem); font-family: Bangers, &quot;Comic Sans MS&quot;, Impact, sans-serif; font-weight: 900; -webkit-text-stroke: clamp(1px, 2vw, 0.77px) rgb(0, 0, 0); transform: none; text-transform: uppercase; word-break: break-word; filter: drop-shadow(rgb(0, 0, 0) 2px 2px 0px) drop-shadow(rgb(239, 68, 68) 1px 1px 0px); background-color: rgb(250, 204, 21); background-image: radial-gradient(circle at 1px 1px, rgb(239, 68, 68) 1px, transparent 0px); background-size: 8px 8px; background-clip: text; -webkit-text-fill-color: transparent; opacity: 1;">
        "April 8 - 9"</div>


      <br>
      <!-- Countdown (flip-clock style) -->
      <div class="flex items-start gap-3 mb-5" id="countdown">
        <div class="flex flex-col items-center">
          <div class="flip-card" id="flip-days">
            <div class="flip-card-inner">
              <div class="flip-card-top"><span class="flip-num" id="days">00</span></div>
              <div class="flip-card-bottom"><span class="flip-num" id="days-bot">00</span></div>
              <div class="flip-center-line"></div>
            </div>
          </div>
          <span class="font-space text-[9px] text-white/50 uppercase tracking-[3px] mt-2 font-bold">Days</span>
        </div>
        <span class="font-anton text-3xl text-red-500/80 self-start" style="line-height: 72px;">:</span>
        <div class="flex flex-col items-center">
          <div class="flip-card" id="flip-hours">
            <div class="flip-card-inner">
              <div class="flip-card-top"><span class="flip-num" id="hours">00</span></div>
              <div class="flip-card-bottom"><span class="flip-num" id="hours-bot">00</span></div>
              <div class="flip-center-line"></div>
            </div>
          </div>
          <span class="font-space text-[9px] text-white/50 uppercase tracking-[3px] mt-2 font-bold">Hrs</span>
        </div>
        <span class="font-anton text-3xl text-red-500/80 self-start" style="line-height: 72px;">:</span>
        <div class="flex flex-col items-center">
          <div class="flip-card" id="flip-minutes">
            <div class="flip-card-inner">
              <div class="flip-card-top"><span class="flip-num" id="minutes">00</span></div>
              <div class="flip-card-bottom"><span class="flip-num" id="minutes-bot">00</span></div>
              <div class="flip-center-line"></div>
            </div>
          </div>
          <span class="font-space text-[9px] text-white/50 uppercase tracking-[3px] mt-2 font-bold">Min</span>
        </div>
        <span class="font-anton text-3xl text-red-500/80 self-start" style="line-height: 72px;">:</span>
        <div class="flex flex-col items-center">
          <div class="flip-card" id="flip-seconds">
            <div class="flip-card-inner">
              <div class="flip-card-top"><span class="flip-num" id="seconds">00</span></div>
              <div class="flip-card-bottom"><span class="flip-num" id="seconds-bot">00</span></div>
              <div class="flip-center-line"></div>
            </div>
          </div>
          <span class="font-space text-[9px] text-white/50 uppercase tracking-[3px] mt-2 font-bold">Sec</span>
        </div>
      </div>

      <!-- Live Badge -->
      <div class="hidden items-center gap-3 px-8 py-4 rounded-full bg-emerald-500/10 border border-emerald-500/20 mb-5"
        id="live-badge" style="box-shadow: 0 0 30px rgba(16,185,129,0.2), 0 0 80px rgba(16,185,129,0.1);">
        <span class="w-3 h-3 rounded-full bg-emerald-400 pulse-dot shadow-[0_0_12px_rgba(16,185,129,0.6)]"></span>
        <span class="font-outfit text-lg font-bold text-emerald-400 tracking-wide">We are live now 🚀</span>
      </div>

      <!-- Stats -->
      <div class="flex gap-6 mb-6">
        <div class="text-center">
          <div id="stat-prize" class="font-outfit text-2xl font-black text-glow">₹100K+</div>
          <div class="font-space text-[8px] text-zinc-600 uppercase tracking-[3px] font-bold mt-1">Prize Pool</div>
        </div>

        <div class="w-px bg-white/5 self-stretch"></div>

        <div class="text-center">
          <div id="stat-events" class="font-outfit text-2xl font-black text-glow">9+</div>
          <div class="font-space text-[8px] text-zinc-600 uppercase tracking-[3px] font-bold mt-1">Events</div>
        </div>

        <div class="w-px bg-white/5 self-stretch"></div>

        <div class="text-center">
          <div id="stat-participants" class="font-outfit text-2xl font-black text-glow">500+</div>
          <div class="font-space text-[8px] text-zinc-600 uppercase tracking-[3px] font-bold mt-1">Participants</div>
        </div>
      </div>

      <!-- CTA with expand animation -->
      <button onclick="expandToPage('competition.html')" id="explore-btn"
        class="inline-flex items-center gap-3 px-10 py-4 bg-white rounded-full font-outfit text-sm font-black text-black uppercase tracking-[3px] cta-white-glow group">
        Explore Events
        <span class="text-base transition-transform duration-300 group-hover:translate-x-1.5">→</span>
      </button>

      <!-- Full-screen expand overlay -->
      <div id="page-expand" class="fixed inset-0 z-[9999] pointer-events-none" style="display:none;">
        <div id="expand-circle" class="absolute rounded-full bg-black"
          style="transform:scale(0);transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);"></div>
      </div>
    </main>

    <!-- ═══ BOTTOM NAV ═══ -->
    <nav
      class="nav-bar-fixed fixed bottom-0 left-0 right-0 h-[72px] bg-black/90 backdrop-blur-2xl border-t border-white/[0.04] flex items-center justify-around px-2 z-50"
      style="padding-bottom: env(safe-area-inset-bottom, 0px);">
      <a href="index.html" class="relative flex flex-col items-center gap-1 px-4 py-2 nav-active">
        <svg class="w-[22px] h-[22px] text-purple-400" style="filter: drop-shadow(0 0 8px rgba(168,85,247,0.5));"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span class="font-space text-[9px] font-bold uppercase tracking-widest text-purple-400">Home</span>
      </a>
      <a href="competition.html" class="flex flex-col items-center gap-1 px-4 py-2">
        <svg class="w-[22px] h-[22px] text-zinc-600" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon
            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
        <span class="font-space text-[9px] font-bold uppercase tracking-widest text-zinc-600">Events</span>
      </a>
      <a href="contact.html" class="flex flex-col items-center gap-1 px-4 py-2">
        <svg class="w-[22px] h-[22px] text-zinc-600" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
        </svg>
        <span class="font-space text-[9px] font-bold uppercase tracking-widest text-zinc-600">Contact</span>
      </a>
      <a href="social.html" class="flex flex-col items-center gap-1 px-4 py-2">
        <svg class="w-[22px] h-[22px] text-zinc-600" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
        </svg>
        <span class="font-space text-[9px] font-bold uppercase tracking-widest text-zinc-600">Social</span>
      </a>
    </nav>
  </div>

  <script src="app.js"></script>
</body>

</html>
